[custom]
; ==================== 核心开关（必须正确，否则转换失败） ====================
enable_rule_generator=true
overwrite_original_rules=true

; ==================== 基础节点设置 ====================
add_emoji=true
remove_old_emoji=true
udp_flag=true
skip_cert_verify_flag=false
; 自动过滤无效内容，避免异常节点
exclude_remarks=(流量|到期|剩余|官网|首页|平台)

; ==================== 固定策略组（永久不变，新节点自动填充） ====================
custom_proxy_group=节点选择`select`[]自动选择`[]DIRECT`[]全部节点
custom_proxy_group=自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,5
custom_proxy_group=全部节点`select`.*
custom_proxy_group=广告拦截`select`[]REJECT`[]DIRECT

; ==================== 固定分流规则（永久不变） ====================
ruleset=广告拦截,[]GEOSITE,category-ads-all
ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,CN
ruleset=节点选择,[]MATCH
