[common]
mixed_port=7890
redir_port=7893
tproxy_port=7895
socks_port=7892
udp=true
allow_lan=true
bind_address=*
mode=rule
log_level=warning
ipv6=false
external_controller=0.0.0.0:9090
unified_delay=true
tcp_concurrent=true
global_client_fingerprint=chrome
geodata_mode=true
geodata_loader=memconservative

; 配置持久化
profile_store_selected=true
profile_store_fake_ip=true

; DNS 配置
enable_dns=true
dns_ipv6=false
dns_use_system_hosts=true
dns_enhanced_mode=fake_ip
dns_fake_ip_range=198.18.0.1/16
dns_listen=0.0.0.0:53
dns_respect_rules=true

dns_default_nameserver=223.5.5.5,119.29.29.29
dns_nameserver=223.5.5.5,119.29.29.29
dns_fallback=1.1.1.1,8.8.8.8,9.9.9.9

dns_fake_ip_filter=+.lan,+.local,+.home.arpa,*.msftncsi.com,*.msftconnecttest.com,connect.rom.miui.com,localhost.ptlogin2.qq.com,+.huawei.com,+.hicloud.com,+.vmall.com,+.hispace.com,+.push.apple.com,+.icloud.com,+.ipleak.net
dns_fallback_filter_geoip=true
dns_fallback_filter_geoip_code=CN

; TUN 配置
enable_tun=true
tun_stack=system
tun_dns_hijack=udp://any:53,tcp://any:53
tun_auto_route=true

; 流量嗅探
enable_sniffer=true
sniffer_override_destination=true
sniffer_parse_pure_ip=true
sniffer_sniff=TLS:443|8443,QUIC:443,HTTP:80|8080-8880
sniffer_force_domain=+.netflix.com,+.nflxvideo.net,+.tiktok.com,+.tiktokv.com,+.ibytedtos.com,+.instagram.com,+.fbcdn.net,+.telegram.org

[proxy_group]
type=select
name=节点选择
proxies=自动选择,DIRECT,全部节点

type=url-test
name=自动选择
url=http://www.gstatic.com/generate_204
interval=600
tolerance=50
include_all_proxies=true

type=select
name=全部节点
include_all_proxies=true

type=select
name=广告拦截
proxies=REJECT,DIRECT

type=select
name=海外APP专项
proxies=自动选择,节点选择

[rule]
; WebRTC 泄露防护
DOMAIN-KEYWORD,stun,REJECT
DOMAIN-KEYWORD,turn,REJECT
DOMAIN-SUFFIX,stun.l.google.com,REJECT

; 广告拦截
GEOSITE,category-ads-all,广告拦截

; 海外重要 APP 分流
GEOSITE,google,海外APP专项
GEOSITE,youtube,海外APP专项
GEOSITE,twitter,海外APP专项
GEOSITE,instagram,海外APP专项
GEOSITE,tiktok,海外APP专项
GEOSITE,telegram,海外APP专项
GEOIP,telegram,海外APP专项

; 国内直连
GEOSITE,cn,DIRECT
GEOIP,CN,DIRECT

; 兜底规则（未匹配的全部走节点选择）
MATCH,节点选择
